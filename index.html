<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moodpin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F5F2EA;
      --ink: #1a1a1a;
      --muted: #9a9488;
      --border: #ddd9ce;
      --card: #ffffff;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
    }

    .logo-placeholder {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 1.75rem;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--border);
    }

    .headline {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .subtext {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.6;
      max-width: 260px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.35rem 0.85rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c8b96e;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 300;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Replace src with your actual logo path -->
    <img src="logo.png" alt="Moodpin logo" class="logo"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
    <div class="logo-placeholder" style="display:none;">📍</div>

    <div class="wordmark">moodpin</div>

    <div class="divider"></div>

    <p class="headline">Something's coming.</p>
    <p class="subtext">
      What you're feeling, when you're feeling it.<br>
      We're still building — check back soon.
    </p>

    <div class="status-pill">
      <span class="status-dot"></span>
      Under Construction
    </div>
  </div>

  <footer>© 2026 Moodpin</footer>

</body>
</html>
